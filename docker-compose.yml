version: "3.8"

services:
  unifi-ai-port:
    build:
      context: .
      args:
        # Override via docker-compose.gpu.yml for CUDA builds.
        TORCH_DEVICE: cpu
    image: unifi-ai-port:latest
    container_name: unifi-ai-port
    restart: unless-stopped
    network_mode: host          # needs host network to reach Protect & cameras
    volumes:
      - ./config:/config        # mount your config.yml here
    environment:
      - PYTHONUNBUFFERED=1

# For GPU acceleration, layer docker-compose.gpu.yml on top:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
# That override sets TORCH_DEVICE=cu121 and reserves the nvidia device.
