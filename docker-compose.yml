version: "3.8"

# Default image: ONVIF bridge (lightweight, ~150–200 MB).
#
# Adopts your real ONVIF cameras natively in UniFi Protect (Protect
# handles video, including H.265) and bridges each camera's onboard
# event stream into Protect via bookmarks + Alarm Manager webhooks.
# No spoofing, no local AI inference.
#
# STATUS: PREPARATION PHASE. The skeleton runs and the web UI is up,
# but ONVIF subscription and the Protect-side POST endpoints are still
# being verified. See SECONDBRAIN.md "ONVIF bridge mode" for the
# roadmap.
#
# If you want the working spoof+inference flow today, layer the full-
# mode compose on top:
#
#   docker compose -f docker-compose.yml -f docker-compose.full.yml up -d --build
#
# That swaps the build to Dockerfile.full (CPU + Intel OpenVINO,
# ~2.5 GB) and runs main.py instead of onvif_bridge.main. Add
# docker-compose.intel.yml on top of that for /dev/dri passthrough,
# or docker-compose.gpu.yml for the CUDA variant.

services:
  unifi-ai-camproxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: unifi-ai-camproxy:latest
    container_name: unifi-ai-camproxy
    restart: unless-stopped
    network_mode: host          # needs host network to reach Protect & cameras
    volumes:
      - ./config:/config        # mount your config.yml here
    environment:
      - PYTHONUNBUFFERED=1
      # - LOG_LEVEL=DEBUG
