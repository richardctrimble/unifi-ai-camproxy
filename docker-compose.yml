version: "3.8"

# Default image: CPU + Intel OpenVINO (~1.5GB). Covers plain CPU hosts
# and Intel iGPU/dGPU/NPU boxes — AIEngine auto-detects the fastest
# reachable device on startup.
#
# For NVIDIA CUDA, layer docker-compose.gpu.yml on top (it swaps the
# build to Dockerfile.cuda):
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
#
# For Intel iGPU/dGPU/NPU, layer docker-compose.intel.yml on top (it
# keeps this same image and just passes through /dev/dri):
#   docker compose -f docker-compose.yml -f docker-compose.intel.yml up -d

services:
  unifi-ai-port:
    build:
      context: .
      dockerfile: Dockerfile
    image: unifi-ai-port:latest
    container_name: unifi-ai-port
    restart: unless-stopped
    network_mode: host          # needs host network to reach Protect & cameras
    volumes:
      - ./config:/config        # mount your config.yml here
    environment:
      - PYTHONUNBUFFERED=1
