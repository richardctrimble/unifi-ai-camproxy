# ─────────────────────────────────────────────────────────────────────────────
# unifi-ai-port configuration
# ─────────────────────────────────────────────────────────────────────────────

unifi:
  host: 192.168.1.1          # IP of your UniFi Dream Machine / UNVR
  token: "PASTE_TOKEN_HERE"  # From Protect → Cameras → QR code (see README)

cameras:
  - name: "Front Door"
    mac: "AA:BB:CC:11:22:33"   # Fake MAC — must be unique, not used by real device
    ip: "192.168.1.101"        # IP to report to Protect (can be this machine's IP)
    rtsp_url: "rtsp://admin:password@192.168.1.50:554/stream1"
    snapshot_url: "http://192.168.1.50/snapshot.jpg"   # optional

    ai:
      model: "yolov8n.pt"      # yolov8n=fast, yolov8s=balanced, yolov8m=accurate
      confidence: 0.50
      detect_persons: true
      detect_vehicles: true
      frame_skip: 3            # analyse every 3rd frame (lower = more CPU)

      # Virtual lines — optional. Coordinates are normalised 0.0 to 1.0
      # where (0,0) is top-left of the frame.
      lines:
        - name: "EntryLine"
          x1: 0.5
          y1: 0.0
          x2: 0.5
          y2: 1.0
          direction: "both"    # left_to_right | right_to_left | both

