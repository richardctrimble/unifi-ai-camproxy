# Build and publish Docker images to GitHub Container Registry (GHCR).
#
# Three images live in the same GHCR package and are distinguished by tag:
#
#   ghcr.io/richardctrimble/unifi-ai-camproxy:latest      ← ONVIF bridge (primary, lightweight)
#   ghcr.io/richardctrimble/unifi-ai-camproxy:full        ← full spoof+inference (CPU + Intel)
#   ghcr.io/richardctrimble/unifi-ai-camproxy:full-cuda   ← full spoof+inference (NVIDIA CUDA)
#
# Calver versioning: YYYY.M.R where M is the month (no leading zero) and
# R is the release number within that month (e.g. 2026.4.1, 2026.4.14).
# Each calver tag has matching variants:
#
#   :2026.4.14         → ONVIF bridge
#   :2026.4.14-full    → full image
#   :2026.4.14-full-cuda → full + CUDA
#
# Automatic build triggers:
#   push to main          → :latest, :full, :sha-<short> (and :sha-...-full)
#   push tag 2026.4.1     → :2026.4.1, :2026.4.1-full, :latest, :full
#   pull_request          → build-only (no push), validates Dockerfiles
#
# ── CUDA build is OPTIONAL ────────────────────────────────────────────────────
# Large and slow. Skipped by default. Enable with one of:
#   1. Manual trigger (workflow_dispatch): check "Build CUDA image" box.
#   2. Repo variable: BUILD_CUDA=true under Settings → Variables.

name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_cuda:
        description: "Build the CUDA (full-cuda) container image"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  # ── Compute and stamp a calver tag (shared by all image jobs) ──────────────
  tag:
    name: Compute calver tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.calver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need full tag history

      - name: Compute calver tag
        id: calver
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)
          PREFIX="${YEAR}.${MONTH}."
          git fetch --tags --quiet
          LAST=$(git tag --list "${PREFIX}*" \
                 | awk -F. -v p="${PREFIX}" 'index($0, p)==1 {print $3}' \
                 | sort -n | tail -1)
          NEXT=$(( ${LAST:-0} + 1 ))
          TAG="${PREFIX}${NEXT}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed calver tag: ${TAG}"

      - name: Create and push calver tag
        if: steps.calver.outputs.tag
        env:
          TAG: ${{ steps.calver.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG" "${{ github.sha }}"
          git push origin "$TAG"

  # ── ONVIF bridge image (primary, lightweight) ──────────────────────────────
  build-onvif:
    name: Build & push (ONVIF bridge → :latest)
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (ONVIF bridge)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/richardctrimble/unifi-ai-camproxy
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.tag.outputs.tag }},enable=${{ needs.tag.outputs.tag != '' }}

      - name: Build and push (ONVIF bridge)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=onvif
          cache-to: type=gha,mode=max,scope=onvif
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ needs.tag.outputs.tag || github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  # ── Full spoof+inference image (CPU + Intel OpenVINO) ──────────────────────
  build-full:
    name: Build & push (full → :full)
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (full)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/richardctrimble/unifi-ai-camproxy
          tags: |
            type=ref,event=branch,suffix=-full
            type=ref,event=tag,suffix=-full
            type=sha,prefix=sha-,suffix=-full
            type=raw,value=full,enable={{is_default_branch}}
            type=raw,value=${{ needs.tag.outputs.tag }}-full,enable=${{ needs.tag.outputs.tag != '' }}

      - name: Build and push (full)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.full
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=full
          cache-to: type=gha,mode=max,scope=full
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ needs.tag.outputs.tag || github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  # ── Full + NVIDIA CUDA image (optional, opt-in) ────────────────────────────
  build-full-cuda:
    name: Build & push (full + CUDA → :full-cuda)
    runs-on: ubuntu-latest
    needs: tag
    if: inputs.build_cuda == true || vars.BUILD_CUDA == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (full-cuda)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/richardctrimble/unifi-ai-camproxy
          tags: |
            type=ref,event=branch,suffix=-full-cuda
            type=ref,event=tag,suffix=-full-cuda
            type=sha,prefix=sha-,suffix=-full-cuda
            type=raw,value=full-cuda,enable={{is_default_branch}}
            type=raw,value=${{ needs.tag.outputs.tag }}-full-cuda,enable=${{ needs.tag.outputs.tag != '' }}

      - name: Build and push (full-cuda)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.full-cuda
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=full-cuda
          cache-to: type=gha,mode=max,scope=full-cuda
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ needs.tag.outputs.tag || github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
