# Build and publish Docker images to GitHub Container Registry (GHCR).
#
# Two images are built and pushed on every push to `main` and on version tags:
#
#   ghcr.io/richardctrimble/unifi-ai-camproxy:latest   (CPU + Intel OpenVINO)
#   ghcr.io/richardctrimble/unifi-ai-camproxy:cuda     (NVIDIA CUDA variant)
#
# Versioning follows a date-based scheme: YYYY-MM-DD-RR where RR is the
# release number for that day (e.g. 2026-04-19-01, 2026-04-19-02, …).
#
# Automatic tags generated by docker/metadata-action:
#   push to main              → :latest  (and :sha-<short>)
#   push tag 2026-04-19-01    → :2026-04-19-01, :latest
#   pull_request              → build-only (no push), for CI validation
#
# The CUDA image is tagged with the "-cuda" suffix so both images can live
# in the same GHCR package without clobbering each other:
#   :latest, :2026-04-19-01        → CPU/Intel image
#   :cuda,  :2026-04-19-01-cuda    → NVIDIA CUDA image

name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-[0-9][0-9]"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  # ── CPU + Intel OpenVINO image ─────────────────────────────────────────────
  build-default:
    name: Build & push (CPU/Intel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/richardctrimble/unifi-ai-camproxy
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── NVIDIA CUDA image ──────────────────────────────────────────────────────
  build-cuda:
    name: Build & push (CUDA)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (CUDA)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/richardctrimble/unifi-ai-camproxy
          # All tags get a "-cuda" suffix so they don't overwrite the default image
          tags: |
            type=ref,event=branch,suffix=-cuda
            type=ref,event=tag,suffix=-cuda
            type=sha,prefix=sha-,suffix=-cuda
            type=raw,value=cuda,enable={{is_default_branch}}

      - name: Build and push (CUDA)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cuda
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
