# Build and publish Docker images to GitHub Container Registry (GHCR).
#
# Two images are built and pushed on every push to `main` and on version tags:
#
#   ghcr.io/richardctrimble/unifi-ai-camproxy:latest   (CPU + Intel OpenVINO)
#   ghcr.io/richardctrimble/unifi-ai-camproxy:cuda     (NVIDIA CUDA variant, optional)
#
# Versioning follows a calver scheme: YYYY.M.R where M is the month
# (no leading zero) and R is the release number within that month
# (e.g. 2026.4.1, 2026.4.2, 2026.5.1, …).
#
# Automatic tags generated by docker/metadata-action:
#   push to main          → :latest  (and :sha-<short>)
#   push tag 2026.4.1     → :2026.4.1, :latest
#   pull_request          → build-only (no push), for CI validation
#
# The CUDA image is tagged with the "-cuda" suffix so both images can live
# in the same GHCR package without clobbering each other:
#   :latest, :2026.4.1        → CPU/Intel image
#   :cuda,  :2026.4.1-cuda    → NVIDIA CUDA image
#
# ── CUDA build is OPTIONAL ────────────────────────────────────────────────────
# The CUDA image is large and slow to build. It is skipped by default on
# automated runs. To enable it, use either method:
#
#   1. Manual trigger (workflow_dispatch): check the "Build CUDA image" box.
#
#   2. Repository variable: set  BUILD_CUDA = true  in
#      Settings → Secrets and variables → Actions → Variables.
#      This enables the CUDA build on every push to main / version tag.

name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_cuda:
        description: "Build the CUDA container image"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  # ── CPU + Intel OpenVINO image ─────────────────────────────────────────────
  build-default:
    name: Build & push (CPU/Intel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/richardctrimble/unifi-ai-camproxy
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  # ── NVIDIA CUDA image ──────────────────────────────────────────────────────
  # Skipped by default. Enable via the workflow_dispatch "build_cuda" input
  # or by setting the repository variable BUILD_CUDA=true.
  build-cuda:
    name: Build & push (CUDA)
    runs-on: ubuntu-latest
    if: inputs.build_cuda == true || vars.BUILD_CUDA == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (CUDA)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/richardctrimble/unifi-ai-camproxy
          # All tags get a "-cuda" suffix so they don't overwrite the default image
          tags: |
            type=ref,event=branch,suffix=-cuda
            type=ref,event=tag,suffix=-cuda
            type=sha,prefix=sha-,suffix=-cuda
            type=raw,value=cuda,enable={{is_default_branch}}

      - name: Build and push (CUDA)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cuda
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
