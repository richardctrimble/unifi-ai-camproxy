# TrueNAS Scale docker-compose template for unifi-ai-port.
# Camera and AI settings are managed through the web UI, not here.

services:
  unifi-ai-port:
    image: {{ values.image.repository }}:{{ values.image.tag }}
    restart: unless-stopped
    network_mode: host
    volumes:
      - {{ values.persistence.config.hostPath }}:/config
    environment:
      - PYTHONUNBUFFERED=1
      - UNIFI_HOST={{ values.unifi.host }}
      - UNIFI_USERNAME={{ values.unifi.username }}
      - UNIFI_PASSWORD={{ values.unifi.password }}
      - WEB_TOOL_PORT={{ values.web_tool.port }}
{% if values.gpu.intel %}
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
{% endif %}
