# ─────────────────────────────────────────────────────────────────────────────
# TrueNAS Scale app install wizard for unifi-ai-port.
#
# Deliberately minimal — just enough to get the container running and
# talking to Protect. All camera and AI configuration is done through
# the embedded web UI at http://<truenas-ip>:<web_port>/ after install.
# ─────────────────────────────────────────────────────────────────────────────

groups:
  - name: "UniFi Controller"
    description: "Connection to your UniFi Protect controller"
  - name: "GPU Acceleration"
    description: "Hardware acceleration for AI inference"
  - name: "Web UI"
    description: "Configuration and line-drawing web interface"
  - name: "Storage"
    description: "Persistent storage for configuration and model cache"

questions:
  # ── UniFi Controller ─────────────────────────────────────────────────────

  - variable: unifi.host
    label: "Protect Host"
    description: "IP address of your UDM, UDM Pro, or UNVR"
    group: "UniFi Controller"
    schema:
      type: string
      required: true
      default: "192.168.1.1"

  - variable: unifi.username
    label: "Username"
    description: "Local Protect account username"
    group: "UniFi Controller"
    schema:
      type: string
      required: true
      default: ""

  - variable: unifi.password
    label: "Password"
    description: "Local Protect account password"
    group: "UniFi Controller"
    schema:
      type: string
      required: true
      private: true
      default: ""

  # ── GPU Acceleration ─────────────────────────────────────────────────────

  - variable: gpu.intel
    label: "Enable Intel GPU Passthrough"
    description: "Pass /dev/dri into the container for Intel iGPU acceleration via OpenVINO"
    group: "GPU Acceleration"
    schema:
      type: boolean
      default: false

  # ── Web UI ───────────────────────────────────────────────────────────────

  - variable: web_tool.port
    label: "Web UI Port"
    description: "After install, open http://<truenas-ip>:<port>/ to add cameras and configure detection"
    group: "Web UI"
    schema:
      type: int
      default: 8091
      min: 1024
      max: 65535

  # ── Storage ──────────────────────────────────────────────────────────────

  - variable: persistence.config.hostPath
    label: "Config Storage Path"
    description: "TrueNAS dataset path for persistent config (e.g. /mnt/pool/apps/unifi-ai-port)"
    group: "Storage"
    schema:
      type: hostpath
      required: true
