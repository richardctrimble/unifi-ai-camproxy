# TrueNAS Scale — "Install via YAML" Docker Compose for unifi-ai-camproxy.
#
# How to use:
#   1. In TrueNAS web UI: Apps > Discover Apps > Custom App > Install via YAML
#   2. Paste this file into the editor
#   3. Edit the values marked CHANGE ME below
#   4. (Optional) Uncomment the hardware-acceleration block that matches your host
#   5. Click Save — TrueNAS pulls the image and starts the container
#   6. Open http://<truenas-ip>:8091/ to configure via the web UI
#
# ── Which image should I use? ────────────────────────────────────────────────
#
#   My cameras are already adopted in UniFi Protect via ONVIF,
#   and they have their own onboard AI (person/vehicle events):
#   → Use :latest (ONVIF bridge, default below). ~150 MB, no GPU.
#     The bridge translates your cameras' own events into Protect
#     bookmarks + Alarm Manager webhooks. Zero local inference.
#
#   I have RTSP-only cameras and want local AI (YOLOv8 person/vehicle
#   detection + optional virtual line-crossing):
#   → Change the image tag to :ai (CPU + Intel) or :ai-cuda (NVIDIA).
#     ~1.5 GB / ~2.5 GB. See the AI mode section below.
#
# ── Staying up to date ───────────────────────────────────────────────────────
#   pull_policy: always (set below) tells Docker to re-pull on every start.
#   To update: Apps → the app → Stop, then Start. That's it.
#   Without pull_policy: always, TrueNAS silently reuses the cached image.

x-portals:
  - name: Web UI
    scheme: http
    host: 0.0.0.0
    port: 8091
    path: /

services:
  unifi-ai-camproxy:
    # ── ONVIF bridge (default) ────────────────────────────────────────────
    # Discovers ONVIF cameras adopted in Protect, subscribes to their event
    # streams, and fires Alarm Manager webhooks. No local AI, no GPU needed.
    #
    # To use local AI instead, replace :latest with :ai (CPU + Intel OpenVINO)
    # or :ai-cuda (NVIDIA GPU) and see the AI mode env vars below.
    image: ghcr.io/richardctrimble/unifi-ai-camproxy:latest
    pull_policy: always
    restart: unless-stopped
    network_mode: host
    volumes:
      # CHANGE ME: path to a TrueNAS dataset, e.g. /mnt/pool/apps/unifi-ai-camproxy
      - /mnt/pool/apps/unifi-ai-camproxy:/config
    environment:
      - PYTHONUNBUFFERED=1

      # ── UniFi Protect connection (required for both modes) ──────────────
      # CHANGE ME: IP or hostname of your UDM / UDM Pro / UNVR
      - UNIFI_HOST=192.168.1.1
      # CHANGE ME: UniFi OS account username
      - UNIFI_USERNAME=your-username
      # CHANGE ME: UniFi OS account password
      - UNIFI_PASSWORD=your-password

      # ── ONVIF bridge mode extras (:latest) ─────────────────────────────
      # API key: Protect → Settings → Control Plane → Integrations → Create API Key
      # Used to fire Alarm Manager webhooks.
      # - UNIFI_API_KEY=your-api-key
      #
      # Fleet ONVIF credentials — applied to every discovered camera.
      # Override per-camera in the ONVIF Creds tab of the web UI.
      # - ONVIF_USERNAME=admin
      # - ONVIF_PASSWORD=onvif-password

      # ── AI mode extras (:ai / :ai-cuda) ────────────────────────────────
      # No extra env vars needed — add cameras and AI settings via the
      # web UI (Setup tab) after the container starts.

      - WEB_TOOL_PORT=8091
      # - LOG_LEVEL=DEBUG

    # ── Hardware acceleration (:ai / :ai-cuda only) ───────────────────────
    # The :latest bridge image runs no inference and ignores GPU passthrough.
    #
    # Option A — Intel iGPU / dGPU / NPU (works with :ai out of the box)
    #   Covers Intel N100, Iris Xe, Arc, Meteor/Arrow Lake NPUs.
    #   /dev/dri must exist on the host; user must be in the "render" group.
    # ─────────────────────────────────────────────────────────────────────
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render

    # ─────────────────────────────────────────────────────────────────────
    # Option B — NVIDIA GPU (requires :ai-cuda image tag above)
    #   Swap image to :ai-cuda, then uncomment the block below.
    #   TrueNAS Scale 24.10+ ships nvidia-container-toolkit on most builds.
    # ─────────────────────────────────────────────────────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
