# ─────────────────────────────────────────────────────────────────────────────
# NVIDIA CUDA AI image override — apply on top of docker-compose.yml.
# Same as docker-compose.ai.yml but builds/runs the CUDA variant.
#
# Requirements on the host:
#   1. NVIDIA GPU with a recent driver (CUDA 12.1 runtime compat)
#   2. nvidia-container-toolkit installed so Docker can see the GPU
#
# Quick start:
#
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.ai-cuda.yml \
#     up -d --build
#
# Once running, check `docker compose logs -f` — AIEngine logs its
# chosen device on startup ("Running inference on: cuda"). If you see
# "cpu", the GPU isn't being passed through.
# ─────────────────────────────────────────────────────────────────────────────

services:
  unifi-ai-camproxy:
    build:
      dockerfile: Dockerfile.ai-cuda
    image: unifi-ai-camproxy:ai-cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
