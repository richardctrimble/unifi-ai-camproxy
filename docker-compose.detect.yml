version: "3.8"

# Layer this on top of docker-compose.yml to build/run the detection image.
#
#   docker compose -f docker-compose.yml -f docker-compose.detect.yml up -d --build
#
# Person and vehicle detection only — no virtual line-crossing.
# For line-crossing use docker-compose.lines.yml instead.
# For NVIDIA CUDA use docker-compose.detect-cuda.yml instead.

services:
  unifi-ai-camproxy:
    build:
      dockerfile: Dockerfile.detect
    image: unifi-ai-camproxy:detect
