version: "3.8"

# Layer this on top of docker-compose.yml to build/run the CUDA detection image.
#
#   docker compose -f docker-compose.yml -f docker-compose.detect-cuda.yml up -d --build
#
# Requires nvidia-container-toolkit on the Docker host.
# https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html

services:
  unifi-ai-camproxy:
    build:
      dockerfile: Dockerfile.detect-cuda
    image: unifi-ai-camproxy:detect-cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
